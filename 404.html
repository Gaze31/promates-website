<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Page Not Found — ProMates</title>
<meta name="robots" content="noindex"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,600&display=swap" rel="stylesheet"/>
<link rel="icon" href="favicon.svg" type="image/svg+xml"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{
  background:#F4EFE6;color:#1C1916;
  font-family:'DM Sans',sans-serif;
  min-height:100vh;
  display:flex;align-items:center;justify-content:center;flex-direction:column;
  text-align:center;padding:40px 24px;
  -webkit-font-smoothing:antialiased;
}
.num{
  font-family:'Playfair Display',serif;
  font-size:clamp(80px,18vw,160px);
  font-weight:700;letter-spacing:-.04em;
  color:#4E9E96;line-height:1;margin-bottom:24px;
}
h1{
  font-family:'Playfair Display',serif;
  font-size:clamp(24px,4vw,40px);
  font-weight:700;letter-spacing:-.02em;
  color:#1C1916;margin-bottom:16px;
}
p{
  font-size:16px;line-height:1.7;
  color:#5A5850;font-weight:300;
  max-width:400px;margin:0 auto 40px;
}
a{
  font-size:13px;font-weight:600;padding:14px 32px;
  background:#1C1916;color:#F4EFE6;
  border-radius:100px;text-decoration:none;
  transition:background .25s;
  display:inline-block;
}
a:hover{background:#4E9E96;}
</style>
</head>
<body>
  <div class="num">404</div>
  <h1>Page not found.</h1>
  <p>The page you're looking for doesn't exist. Maybe you followed an old link?</p>
  <a href="/">Back to Home</a>
</body>
</html>
